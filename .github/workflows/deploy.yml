name: Deploy to VPS

on:
  push:
    branches: [master]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 31.97.86.247
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          timeout: 600s
          script: |
            cd /var/www/agenda-allamey
            git pull origin master
            npm install --production=false
            npx prisma generate
            npx prisma db push --skip-generate
            npm run build
            pm2 restart agenda-allamey --update-env
            echo "Deploy completado: $(date)"
